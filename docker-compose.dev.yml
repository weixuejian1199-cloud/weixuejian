# ============================================================
# 企业AI工作站 Docker Compose — 开发环境覆盖
# 使用: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# 或直接: make dev
# ============================================================

services:
  backend:
    build:
      target: development
    environment:
      NODE_ENV: development
      DB_PASSWORD: postgres_local_dev
      REDIS_PASSWORD: redis_local_dev
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/prisma:/app/packages/backend/prisma
      - ./packages/backend/tsconfig.json:/app/packages/backend/tsconfig.json
      - ./packages/shared:/app/packages/shared
      - ./tsconfig.base.json:/app/tsconfig.base.json

  postgres:
    command: >
      postgres
      -c log_min_duration_statement=200
      -c log_statement=ddl
      -c shared_buffers=128MB
      -c work_mem=4MB
    environment:
      POSTGRES_PASSWORD: postgres_local_dev

  redis:
    command: >
      redis-server
      --requirepass redis_local_dev
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_local_dev", "ping"]
