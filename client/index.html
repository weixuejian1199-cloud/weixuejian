<!doctype html>
<html lang="zh-CN">
  <head>
    <!-- Force HTTPS redirect: iOS Safari requires HTTPS for module scripts and cookies -->
    <script>
      if (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        location.replace('https:' + location.href.substring(location.protocol.length));
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ATLAS — 智能报表系统</title>
    <meta name="description" content="ATLAS 智能报表系统，上传 Excel/CSV 数据，秒出专业报表。支持财务分析、销售报表、工资条生成、考勤汇总。" />
    <meta name="keywords" content="报表生成,Excel分析,AI报表,工资条,考勤汇总,财务报表,智能报表" />
    <meta property="og:title" content="ATLAS — 智能报表系统" />
    <meta property="og:description" content="上传 Excel，秒出专业报表。支持财务、销售、HR 全场景报表生成。" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0A0F1E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
