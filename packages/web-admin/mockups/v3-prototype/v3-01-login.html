<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时皙AI工作站 - 登录</title>
<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}
:root {
  --text-primary: #1A1A1A;
  --text-secondary: #666666;
  --text-muted: #999999;
  --bg: #FFFFFF;
  --sidebar-bg: #F9F9F9;
  --divider: #F0F0F0;
  --input-border: #E8E8E8;
  --input-bg: #F5F5F5;
  --hover-bg: #F3F3F3;
  --active-bg: #EFEFEF;
  --accent: #1A1A1A;
  --green: #00B42A;
  --red: #E53835;
  --orange: #FF7D00;
  --font: -apple-system, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
  --font-mono: 'SF Mono', 'Roboto Mono', monospace;
}
html, body {
  height: 100%;
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
  color: var(--text-primary);
  background: var(--bg);
}

/* === Layout === */
.login-wrapper {
  display: flex;
  height: 100vh;
  overflow: hidden;
}
.brand-panel {
  width: 60%;
  background: var(--accent);
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: 60px;
}
.form-panel {
  width: 40%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px 48px;
  position: relative;
}

/* === Decorative geometry === */
.brand-panel::before {
  content: '';
  position: absolute;
  top: -120px; right: -120px;
  width: 400px; height: 400px;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 50%;
}
.brand-panel::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -80px;
  width: 300px; height: 300px;
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 50%;
}
.deco-line-1 {
  position: absolute;
  top: 20%; left: 10%;
  width: 160px; height: 1px;
  background: rgba(255,255,255,.10);
  transform: rotate(-25deg);
}
.deco-line-2 {
  position: absolute;
  bottom: 30%; right: 8%;
  width: 120px; height: 1px;
  background: rgba(255,255,255,.08);
  transform: rotate(15deg);
}
.deco-dot {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,.12);
}
.deco-dot-1 { top: 15%; right: 25%; }
.deco-dot-2 { bottom: 22%; left: 20%; }
.deco-dot-3 { top: 45%; left: 8%; width: 4px; height: 4px; }

/* === Brand content === */
.brand-content {
  text-align: center;
  position: relative;
  z-index: 1;
}
.brand-logo {
  width: 56px; height: 56px;
  background: #fff;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
}
.brand-logo span {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}
.brand-title {
  font-size: 32px;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.brand-slogan {
  font-size: 16px;
  color: rgba(255,255,255,.55);
  font-weight: 400;
  letter-spacing: 2px;
}

/* Features */
.features {
  display: flex;
  gap: 48px;
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
}
.feature-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.feature-icon {
  width: 40px; height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 10px;
}
.feature-icon svg {
  width: 20px; height: 20px;
  fill: none;
  stroke: #fff;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.feature-label {
  font-size: 12px;
  color: rgba(255,255,255,.45);
  letter-spacing: 1px;
}

/* === Form panel === */
.form-container {
  width: 100%;
  max-width: 360px;
}
.form-title {
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 6px;
}
.form-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 36px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--divider);
  position: relative;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 10px 0;
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  transition: color .2s;
  position: relative;
  user-select: none;
}
.tab.active { color: var(--text-primary); font-weight: 500; }
.tab-indicator {
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 50%;
  height: 2px;
  background: var(--accent);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.tab-indicator.right { transform: translateX(100%); }

/* Form groups */
.tab-content { display: none; }
.tab-content.active { display: block; }
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.input-row {
  display: flex;
  gap: 10px;
}
.phone-prefix {
  width: 72px;
  height: 44px;
  border: 1px solid var(--input-border);
  border-radius: 8px;
  background: var(--input-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-primary);
  flex-shrink: 0;
}
.form-input {
  width: 100%;
  height: 44px;
  border: 1px solid var(--input-border);
  border-radius: 8px;
  background: var(--input-bg);
  padding: 0 14px;
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  transition: border-color .2s;
  font-family: inherit;
}
.form-input:focus {
  border-color: #333;
  background: #fff;
}
.form-input::placeholder {
  color: var(--text-muted);
}
.code-row {
  display: flex;
  gap: 10px;
}
.code-row .form-input { flex: 1; }
.code-btn {
  width: 110px;
  height: 44px;
  border: 1px solid var(--input-border);
  border-radius: 8px;
  background: var(--bg);
  font-size: 13px;
  color: var(--text-primary);
  cursor: pointer;
  transition: background .15s, border-color .15s;
  font-family: inherit;
  flex-shrink: 0;
}
.code-btn:hover { border-color: #ccc; }
.code-btn:disabled {
  color: var(--text-muted);
  cursor: not-allowed;
}

/* Password toggle */
.password-wrap {
  position: relative;
}
.password-wrap .form-input { padding-right: 42px; }
.pwd-toggle {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  padding: 4px;
}
.pwd-toggle svg {
  width: 18px; height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Login button */
.login-btn {
  width: 100%;
  height: 46px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .15s;
  margin-top: 8px;
  font-family: inherit;
}
.login-btn:hover { opacity: .85; }
.login-btn:active { opacity: .75; }

/* Quick login */
.quick-section {
  margin-top: 40px;
  text-align: center;
}
.quick-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.quick-label::before,
.quick-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--divider);
}
.quick-btns {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.quick-btn {
  height: 32px;
  padding: 0 14px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  background: #fff;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.quick-btn:hover {
  border-color: var(--accent);
  color: var(--text-primary);
}

/* Footer */
.footer {
  position: absolute;
  bottom: 24px;
  left: 0; right: 0;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
}

/* === Responsive === */
@media (max-width: 860px) {
  .brand-panel { display: none; }
  .form-panel { width: 100%; }
}
</style>
</head>
<body>

<div class="login-wrapper">
  <!-- Left: Brand Panel -->
  <div class="brand-panel">
    <div class="deco-line-1"></div>
    <div class="deco-line-2"></div>
    <div class="deco-dot deco-dot-1"></div>
    <div class="deco-dot deco-dot-2"></div>
    <div class="deco-dot deco-dot-3"></div>

    <div class="brand-content">
      <div class="brand-logo"><span>S</span></div>
      <div class="brand-title">时皙AI工作站</div>
      <div class="brand-slogan">一句话，管全公司</div>
    </div>

    <div class="features">
      <div class="feature-item">
        <div class="feature-icon">
          <!-- Chat bubble -->
          <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        </div>
        <div class="feature-label">AI对话</div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <!-- Lightbulb / decision -->
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/></svg>
        </div>
        <div class="feature-label">智能决策</div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <!-- Bar chart -->
          <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </div>
        <div class="feature-label">数据驱动</div>
      </div>
    </div>
  </div>

  <!-- Right: Form Panel -->
  <div class="form-panel">
    <div class="form-container">
      <div class="form-title">欢迎回来</div>
      <div class="form-subtitle">登录时皙AI工作站</div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" data-tab="phone">手机登录</div>
        <div class="tab" data-tab="account">账号登录</div>
        <div class="tab-indicator"></div>
      </div>

      <!-- Phone login -->
      <div class="tab-content active" id="tab-phone">
        <div class="form-group">
          <label>手机号</label>
          <div class="input-row">
            <div class="phone-prefix">+86</div>
            <input class="form-input" type="tel" placeholder="请输入手机号" maxlength="11">
          </div>
        </div>
        <div class="form-group">
          <label>验证码</label>
          <div class="code-row">
            <input class="form-input" type="text" placeholder="请输入验证码" maxlength="6">
            <button class="code-btn" id="codeBtn" onclick="sendCode()">获取验证码</button>
          </div>
        </div>
        <button class="login-btn" onclick="handleLogin()">登 录</button>
      </div>

      <!-- Account login -->
      <div class="tab-content" id="tab-account">
        <div class="form-group">
          <label>用户名</label>
          <input class="form-input" type="text" placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label>密码</label>
          <div class="password-wrap">
            <input class="form-input" id="pwdInput" type="password" placeholder="请输入密码">
            <button class="pwd-toggle" onclick="togglePwd()" aria-label="切换密码显示">
              <svg id="eyeIcon" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button class="login-btn" onclick="handleLogin()">登 录</button>
      </div>

      <!-- Quick login -->
      <div class="quick-section">
        <div class="quick-label">开发演示 快速登录</div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="quickLogin('super')">超管</button>
          <button class="quick-btn" onclick="quickLogin('admin')">管理员</button>
          <button class="quick-btn" onclick="quickLogin('finance')">财务</button>
          <button class="quick-btn" onclick="quickLogin('ops')">运营</button>
          <button class="quick-btn" onclick="quickLogin('cs')">客服</button>
          <button class="quick-btn" onclick="quickLogin('purchase')">采购</button>
        </div>
      </div>
    </div>

    <div class="footer">&copy; 2026 时皙科技</div>
  </div>
</div>

<script>
// Tab switching
const tabs = document.querySelectorAll('.tab');
const contents = document.querySelectorAll('.tab-content');
const indicator = document.querySelector('.tab-indicator');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.tab;
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    contents.forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + target).classList.add('active');
    indicator.classList.toggle('right', target === 'account');
  });
});

// Send verification code with countdown
let codeTimer = null;
function sendCode() {
  const btn = document.getElementById('codeBtn');
  if (btn.disabled) return;
  btn.disabled = true;
  let sec = 60;
  btn.textContent = sec + 's';
  codeTimer = setInterval(() => {
    sec--;
    if (sec <= 0) {
      clearInterval(codeTimer);
      btn.disabled = false;
      btn.textContent = '获取验证码';
    } else {
      btn.textContent = sec + 's';
    }
  }, 1000);
}

// Password visibility toggle
let pwdVisible = false;
function togglePwd() {
  pwdVisible = !pwdVisible;
  const input = document.getElementById('pwdInput');
  const icon = document.getElementById('eyeIcon');
  input.type = pwdVisible ? 'text' : 'password';
  if (pwdVisible) {
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// Login handler
function handleLogin() {
  alert('登录功能仅为演示，请使用下方快速登录按钮');
}

// Quick login routing
function quickLogin(role) {
  const routes = {
    'super': 'v3-02-super-admin.html',
    'cs': 'v3-03-cs-workspace.html',
    'finance': 'v3-04-finance.html',
    'ops': 'v3-05-ops.html'
  };
  if (routes[role]) {
    window.location.href = routes[role];
  } else {
    if (role === 'admin') { window.location.href = 'v3-07-admin-config.html'; return; }
    const names = { purchase: '采购' };
    alert((names[role] || role) + ' 工作台正在开发中');
  }
}
</script>
</body>
</html>
