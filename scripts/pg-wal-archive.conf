# ============================================================
# 企业AI工作站 — PostgreSQL WAL 归档配置
# 用途：启用 WAL 归档实现增量备份 / 时间点恢复 (PITR)
#
# 使用方法：
#   1. 将此文件内容追加到 postgresql.conf
#   2. 或在 docker-compose.yml 中挂载为额外配置：
#      volumes:
#        - ./scripts/pg-wal-archive.conf:/etc/postgresql/conf.d/wal-archive.conf
#      command: postgres -c 'config_file=/etc/postgresql/postgresql.conf'
#               -c 'include_dir=/etc/postgresql/conf.d'
#
# 注意：修改后需要重启 PostgreSQL 服务
# ============================================================

# ---- WAL 归档模式 ----
# on = 启用归档，PostgreSQL 在 WAL 段写满后调用 archive_command
archive_mode = on

# ---- 归档命令 ----
# %p = WAL 文件的完整路径
# %f = WAL 文件名（不含路径）
# 目标目录必须预先创建且 postgres 用户有写权限
archive_command = 'test ! -f /data/wal-archive/%f && cp %p /data/wal-archive/%f'

# ---- 归档目录 ----
# 在 Docker 中建议挂载宿主机目录：
#   volumes:
#     - /data/wal-archive:/data/wal-archive
# 确保目录权限：chown postgres:postgres /data/wal-archive

# ---- WAL 相关参数 ----
# wal_level 必须 >= replica 才能支持归档（PostgreSQL 15 默认就是 replica）
wal_level = replica

# WAL 段大小保持默认 16MB，不建议修改
# wal_segment_size = 16MB

# 最大 WAL 发送进程数（归档+流复制共用）
max_wal_senders = 3

# 保留的最小 WAL 段数，防止归档延迟导致 WAL 被回收
wal_keep_size = 256MB

# ---- 归档超时 ----
# 即使 WAL 没写满，也强制归档的间隔（秒），0=禁用
# 对于低写入量的系统建议设为 300（5分钟），确保数据不超过5分钟的丢失窗口
archive_timeout = 300

# ---- 恢复相关（用于 PITR 恢复时配置） ----
# 恢复时取消下面的注释：
# restore_command = 'cp /data/wal-archive/%f %p'
# recovery_target_time = '2026-03-30 12:00:00'
# recovery_target_action = 'promote'
