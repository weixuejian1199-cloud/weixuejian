# ============================================================
# CI: Lint + Test + web-admin build
# 每次 push / PR：ESLint、后端 tsc、Vitest、管理端生产构建
# ============================================================

name: Test & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: test-secret-key-must-be-at-least-32-characters-long
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: TypeScript compile check
        run: cd packages/backend && npx tsc --noEmit

      - name: Build web-admin
        run: pnpm --filter @enterprise/web-admin build
        env:
          VITE_API_BASE_URL: ''

      - name: Run tests
        run: pnpm test

      - name: Validate Prisma schema
        run: DATABASE_URL="postgresql://postgres:postgres@localhost:5432/enterprise_workstation_test" pnpm --filter backend exec prisma validate

      - name: Session Guard — commit check
        run: |
          # RULE-21: 禁止删除测试文件
          DELETED_TESTS=$(git diff --name-status HEAD~1 HEAD 2>/dev/null | grep "^D.*\.test\." || true)
          if [ -n "$DELETED_TESTS" ]; then
            echo "❌ RULE-21 违规：禁止删除测试文件"
            echo "$DELETED_TESTS"
            exit 1
          fi
          # RULE-22: 禁止 as unknown as Record 类型绕过（新增代码）
          UNSAFE=$(git diff HEAD~1 HEAD -- '*.ts' 2>/dev/null | grep "^+" | grep "as unknown as Record" | grep -v "^+++" || true)
          if [ -n "$UNSAFE" ]; then
            echo "❌ RULE-22 违规：新增代码包含 as unknown as Record"
            echo "$UNSAFE"
            exit 1
          fi
          echo "✅ Session Guard checks passed"
